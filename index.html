<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#031728;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;}
#wrap{position:relative;width:500px;line-height:0;}
#bg{display:block;width:500px;image-rendering:pixelated;}
#oc{position:absolute;top:0;left:0;width:500px;height:100%;cursor:crosshair;image-rendering:pixelated;}
#ui{color:#5ad;font:10px monospace;letter-spacing:1px;margin-top:5px;text-align:center;opacity:.65;}
#kl{color:#ec4556;}

#winscreen{
  display:none;
  position:absolute;
  top:0;left:0;
  width:500px;height:288px;
  background:#031728;
  flex-direction:column;align-items:center;justify-content:center;
  gap:18px;opacity:0;transition:opacity 0.9s ease;z-index:99;
}
#winscreen.show{display:flex;}
#winscreen.fade{opacity:1;}
#win-msg {
  color: #5ad;
  font: 11px monospace;
  letter-spacing: 2px;
  text-align: center;
  line-height: 2;
}

#win-msg b {
  color: #ec4556;
  font-size: 18px; /* Changed from 12px to 18px to make it bigger */
  display: block;
  margin-bottom: 8px; /* Added a little more space under the big text */
}
#fishcanvas{image-rendering:pixelated;}
#play-again{
  padding:7px 24px;background:transparent;border:1px solid #5ad;
  color:#5ad;font:bold 10px monospace;letter-spacing:3px;cursor:pointer;
  text-transform:uppercase;transition:background 0.2s,color 0.2s;
}
#play-again:hover{background:#5ad;color:#031728;}
</style></head>
<body>

<div id="wrap">
<img id="bg" alt="">
<canvas id="oc"></canvas>

  </div>
  <button id="play-again" onclick="location.reload()">play again</button>
</div>
</div>

const OBSTACLES = [
  // Left wall lily mass (thick stacked column)
  {x:142, y:148, r:26},

];

function inObstacle(x,y,r=0){
  for(const o of OBSTACLES){
    if(Math.hypot(x-o.x,y-o.y)<o.r+r+10) return true;
  }
  return false;
}

function avoidanceAngle(fx,fy){
  let ax=0,ay=0;
  for(const o of OBSTACLES){
    const dx=fx-o.x, dy=fy-o.y;
    const dist=Math.hypot(dx,dy);
    const threshold=o.r+30;
    if(dist<threshold&&dist>0){
      const force=(threshold-dist)/threshold;
      ax+=dx/dist*force;
      ay+=dy/dist*force;
    }
  }
  if(ax===0&&ay===0) return null;
  return Math.atan2(ay,ax);
}

  px(-13, -3.5 + tw, T2, 1, 1.5);
  px(-13, 2 + tw, T2, 1, 1.5);
  px(-1, -3.5, T1, 3, 0.5);
  px(-2, -4.5, T2, 2, 1);
  px(3, 2.5, T1, 2, 1);
  px(2, 3.5, T2, 2, 1.5);
  px(3, -3, T1, 2, 1);
}

function drawKoiSilver(cx, s, wag) {

// ─── RIPPLE ─────────────────────────────────────────────────────────────────
class Ripple{
  constructor(x,y,big){this.x=x;this.y=y;this.r=1;this.max=big?35:22;this.a=0.7;}
  step(){this.r+=0.85;this.a=0.7*(1-this.r/this.max);}
  draw(){
    cx.save();cx.globalAlpha=this.a;
    cx.strokeStyle='#6ee8e0';cx.lineWidth=1;
    cx.beginPath();cx.ellipse(this.x,this.y,this.r,this.r*0.3,0,0,Math.PI*2);
    cx.stroke();cx.restore();
  }
  done(){return this.r>=this.max;}
}

// ─── ZONES ───────────────────────────────────────────────────────────────────
// North zone: y < 165  |  South zone: y > 165
// Fish assigned to a zone strongly prefer waypoints in that zone.
const WAYPOINTS_NORTH = [
  {x:190, y:140},
  {x:230, y:128},
  {x:275, y:122},
  {x:318, y:128},
  {x:362, y:140},
  {x:210, y:162},
  {x:270, y:158},
  {x:318, y:162},
];
const WAYPOINTS_SOUTH = [
  {x:175, y:210},
  {x:192, y:248},
  {x:220, y:265},
  {x:255, y:210},
  {x:278, y:240},
  {x:215, y:188},
  {x:265, y:192},
  {x:450, y:220},
  {x:478, y:242},
  {x:455, y:265},
  {x:420, y:260},
  {x:390, y:268},
];
const WAYPOINTS_ALL = [...WAYPOINTS_NORTH, ...WAYPOINTS_SOUTH];

// Fixed patrol routes for specific fish
// Mid-top red: top-left → mid-top → top-right → mid-top (loop)
const PATROL_MIDTOP = [
  {x:190, y:130},  // top-left
  {x:275, y:148},  // mid-top centre
  {x:362, y:130},  // top-right
  {x:275, y:148},  // mid-top centre
];
// North gold: strictly left→right→left in north corridor
const PATROL_NORTH_GOLD = [
  {x:200, y:160},  // north-left
  {x:318, y:158},  // north-right
];
// Bottom silver: strict left-to-right horizontal patrol, same y-level
const PATROL_BOTTOM = [
  {x:175, y:257},  // bottom-left safe spawn
  {x:455, y:257},  // bottom-right safe end
];

// ─── FISH CLASS ──────────────────────────────────────────────────────────────
class Fish{
  // zone: 'n' = north, 's' = south
  // lazy: true = very low turn rate, swims in long straight arcs
  constructor(type,x,y,sc,angle,zone,lazy){
    this.type=type; this.x=x; this.y=y; this.sc=sc;
    this.zone=zone||'s';
    this.lazy=!!lazy;
    this.angle=angle??Math.random()*Math.PI*2;
    this.ta=this.angle;
    this.bspd=(0.18+Math.random()*0.1)*(sc<0.7?0.8:1);
    this.spd=this.bspd;
    this.wag=0; this.wd=1;
    this.scared=0; this.hits=0;
    this.dead=false; this.deadT=0; this.fv=0; this.op=1;
    // Lazy fish hold a heading much longer before picking a new one
    this.ct=this.lazy ? 320+Math.random()*280 : 100+Math.random()*140;
    // Lazy fish turn very slowly; normal fish turn at moderate rate
    this.baseTr=this.lazy ? 0.006+Math.random()*0.004 : 0.018+Math.random()*0.008;
    this.tr=this.baseTr;
    this.avoidTimer=0;
    this.blockedFrames=0;
    this.ghostTimer=0;
    // Patrol route (array of waypoints cycled in order). null = use random zone waypoints.
    this.patrol=null;
    this.patrolIdx=0;
  }
  htest(mx,my){return Math.hypot(mx-this.x,my-this.y)<20*this.sc;}
  scare(){
    if(this.dead)return;
    this.hits++;
    this.scared=70+Math.random()*50;
    this.spd=this.bspd*(3+this.hits*0.7);
    this.ta=this.angle+Math.PI+(Math.random()-0.5)*2;
    if(this.hits>=3)this.die();
  }
  die(){
    if(this.dead)return;
    this.dead=true; this.spd=0; this.deadT=300;
    kills++;
    document.getElementById('kl').textContent='🔪 '+kills+' / '+TOTAL_FISH+' lost';
    const allDead=FISH.every(f=>f.dead);
    if(allDead&&!gameWon){
      gameWon=true;
      setTimeout(()=>{
        document.getElementById('kl').textContent='🔪'+TOTAL_FISH+' / '+TOTAL_FISH+' = pond cleared!';
        drawDeadFish();
        const ws=document.getElementById('winscreen');
        ws.classList.add('show');
        requestAnimationFrame(()=>requestAnimationFrame(()=>ws.classList.add('fade')));
      },1200);
    }
  }
  pickWaypoint(){
    if(this.patrol){
      // Advance to next patrol point in sequence
      this.patrolIdx=(this.patrolIdx+1)%this.patrol.length;
      return this.patrol[this.patrolIdx];
    }
    const pool = Math.random()<0.9
      ? (this.zone==='n' ? WAYPOINTS_NORTH : WAYPOINTS_SOUTH)
      : WAYPOINTS_ALL;
    if(this.lazy){
      return pool.reduce((best,w)=>{
        const d=Math.hypot(w.x-this.x,w.y-this.y);
        return d>Math.hypot(best.x-this.x,best.y-this.y)?w:best;
      },pool[0]);
    }
    return pool[Math.floor(Math.random()*pool.length)];
  }
  update(){
    if(this.dead){
      this.deadT--;
      if(this.fv>-5)this.fv-=0.07;
      this.y+=this.fv*0.06;
      if(this.deadT<60)this.op=this.deadT/60;
      this.y=Math.max(5,Math.min(H-5,this.y));
      return this.deadT>0;
    }
    if(this.scared>0){
      this.scared--; this.tr=0.1;
      if(this.scared<20)this.spd*=0.97;
    }else{this.spd+=(this.bspd-this.spd)*0.02; this.tr=this.baseTr;}

    // Ghost mode: fish phases straight through obstacle toward nearest zone waypoint.
    // No obstacle checks. No turning hesitation. Just swim until clear.
    if(this.ghostTimer>0){
      this.ghostTimer--;
      const pool=this.zone==='n'?WAYPOINTS_NORTH:WAYPOINTS_SOUTH;
      let bestWP=pool[0], bestDist=Infinity;
      for(const w of pool){
        const d=Math.hypot(w.x-this.x,w.y-this.y);
        if(d<bestDist){bestDist=d;bestWP=w;}
      }
      // Gently steer toward safe waypoint but mostly keep going straight
      const ghostTarget=Math.atan2(bestWP.y-this.y,bestWP.x-this.x);
      let gda=ghostTarget-this.angle;
      while(gda>Math.PI)gda-=Math.PI*2; while(gda<-Math.PI)gda+=Math.PI*2;
      this.angle+=gda*0.04;
      this.x=Math.max(5,Math.min(W-5,this.x+Math.cos(this.angle)*this.spd*1.4));
      this.y=Math.max(5,Math.min(H-5,this.y+Math.sin(this.angle)*this.spd*1.4));
      this.wag+=(0.08)*this.wd;
      if(Math.abs(this.wag)>1)this.wd*=-1;
      if(!inObstacle(this.x,this.y,4)){this.ghostTimer=0;this.blockedFrames=0;}
      return true;
    }

    // Obstacle avoidance — only gentle nudge, not a hard override
    // (so fish don't get steered INTO other obstacles while avoiding one)
    const avoid=avoidanceAngle(this.x,this.y);
    if(avoid!==null&&!this.scared&&this.avoidTimer<=0){
      // Blend avoid angle with current target rather than replacing it
      let avDA=avoid-this.ta;
      while(avDA>Math.PI)avDA-=Math.PI*2; while(avDA<-Math.PI)avDA+=Math.PI*2;
      this.ta+=avDA*0.45;
      this.avoidTimer=25;
    } else if(this.avoidTimer>0){
      this.avoidTimer--;
    }

    // Pick next waypoint when timer expires
    this.ct--;
    if(this.ct<=0&&!this.scared){
      const wp=this.pickWaypoint();
      const tx=wp.x+(Math.random()-0.5)*30;
      const ty=wp.y+(Math.random()-0.5)*30;
      this.ta=Math.atan2(ty-this.y, tx-this.x);
      this.ct=this.lazy ? 280+Math.random()*280 : 140+Math.random()*180;
    }

    // Wall repulsion
    const M=22*this.sc;
    if(this.x<M)this.ta=0;
    else if(this.x>W-M)this.ta=Math.PI;
    if(this.y<M)this.ta=Math.PI/2;
    else if(this.y>H-M)this.ta=-Math.PI/2;

    // Smooth angle turn
    let da=this.ta-this.angle;
    while(da>Math.PI)da-=Math.PI*2; while(da<-Math.PI)da+=Math.PI*2;
    this.angle+=da*this.tr;

    const nx=this.x+Math.cos(this.angle)*this.spd;
    const ny=this.y+Math.sin(this.angle)*this.spd;

    if(!inObstacle(nx,ny,4)){
      this.x=Math.max(5,Math.min(W-5,nx));
      this.y=Math.max(5,Math.min(H-5,ny));
      this.blockedFrames=0;
    } else {
      this.blockedFrames++;
      if(this.blockedFrames>3){
        // Enter ghost mode immediately — no ticking, just swim through
        this.ghostTimer=75;
        this.blockedFrames=0;
      }
      // Hold facing — no angle change while blocked
    }

    this.wag+=(0.06+(this.spd/this.bspd)*0.08)*this.wd;
    if(Math.abs(this.wag)>1)this.wd*=-1;
    return true;
  }
}

// ─── RENDER FISH ────────────────────────────────────────────────────────────
function renderFish(f){
  cx.save();
  cx.globalAlpha=f.op;
  cx.translate(Math.round(f.x),Math.round(f.y));
  if(f.dead){
    cx.rotate(f.angle);
    cx.scale(1,-1);
    cx.rotate(0.05*Math.sin(T*0.03));
  } else {
    cx.rotate(f.angle);
  }
  const w=f.dead?0:f.wag;
  if(f.type==='r') drawKoiRed(cx,f.sc,w);
  else if(f.type==='g') drawKoiGold(cx,f.sc,w);
  else drawKoiSilver(cx,f.sc,w);
  cx.restore();

  {
    cx.save();
    cx.globalAlpha=f.op;
    const eyeOff=f.sc*13;
    const ex=f.x+Math.cos(f.angle)*eyeOff;
    const ey=f.y+Math.sin(f.angle)*eyeOff;
    cx.fillStyle='#111111';
    cx.beginPath(); cx.arc(ex,ey,1.1*f.sc,0,Math.PI*2); cx.fill();
    if(f.dead){
      const arm=6*f.sc, thick=1.5*f.sc;
      cx.fillStyle='#111111';
      cx.fillRect(ex-arm, ey-thick/2, arm*2, thick);
      cx.fillRect(ex-thick/2, ey-arm, thick, arm*2);
    }
    cx.restore();
  }

  if(f.hits>0&&f.scared>55&&!f.dead){
    cx.save(); cx.globalAlpha=Math.min(1,(f.scared-55)/15)*f.op;
    cx.fillStyle='#ec4556'; cx.font='bold '+(8+f.hits)+'px monospace'; cx.textAlign='center';
    cx.fillText('!'.repeat(Math.min(f.hits,5)),f.x,f.y-20*f.sc);
    cx.restore();
  }
}

// ─── INITIAL FISH ─────────────────────────────────────────────────────────
// 2 north fish, 3 south fish. Some lazy (straight swimmers), some normal.
//                 type  x    y    sc    angle  zone  lazy
const FISH=[
  // Mid-top red: patrols mid-top → top-left → mid-top → top-right
  (()=>{ const f=new Fish('r', 275, 148, 1.05, Math.PI, 'n', true); f.patrol=PATROL_MIDTOP; f.patrolIdx=0; f.ct=1; return f; })(),
  // Second north fish: normal random roamer in north zone
  new Fish('g',  318, 128, 1.0,  -1.0,  'n', false),
  // South centre lazy
  new Fish('r',  255, 210, 0.88, -0.5,  's', true ),
  // South lower-left normal
  new Fish('g',  192, 248, 0.92,  0.8,  's', false),
  // Bottom silver: patrols bottom-right ↔ bottom-left
  (()=>{ const f=new Fish('s', 400, 253, 0.85, Math.PI, 's', true); f.patrol=PATROL_BOTTOM; f.patrolIdx=0; f.ct=1; return f; })(),
];

const RIPPLES=[];

// ─── DEAD FISH PIXEL ART ──────────────────────────────────────────────────
function drawDeadFish(){
  const fc=document.getElementById('fishcanvas');
  const fc2=fc.getContext('2d');
  fc2.imageSmoothingEnabled=false;
  const px=[
    [4,0],[3,1],[4,1],[5,1],
    [2,2],[3,2,'#000'],[4,2],[5,2,'#000'],[6,2],
    [1,3],[2,3],[3,3],[4,3,'#000'],[5,3],[6,3],[7,3],
    [0,4],[1,4],[2,4],[3,4,'#000'],[4,4],[5,4,'#000'],[6,4],[7,4],[8,4],
    [0,5],[1,5],[2,5],[3,5],[4,5],[5,5],[6,5],[7,5],[8,5],
    [0,6],[1,6],[4,6],[7,6],[8,6],
    [0,7],[4,7],[8,7],
    [2,8],[3,8],[4,8],[5,8],[6,8],
    [1,9],[4,9],[7,9],
    [0,10],[4,10],[8,10],
    [2,11],[3,11],[4,11],[5,11],[6,11],
    [1,12],[4,12],[7,12],
    [0,13],[4,13],[8,13],
    [2,14],[3,14],[4,14],[5,14],[6,14],
    [1,15],[4,15],[7,15],
    [0,16],[4,16],[8,16],
    [2,17],[3,17],[4,17],[5,17],[6,17],
    [1,18],[4,18],[7,18],
    [4,19],
    [3,20],[4,20],[5,20],
    [2,21],[3,21],[4,21],[5,21],[6,21],
    [1,22],[2,22],[3,22],[5,22],[6,22],[7,22],
    [1,23],[2,23],[6,23],[7,23],
    [1,24],[7,24],
  ];
  const S=4;
  fc2.clearRect(0,0,fc.width,fc.height);
  for(const p of px){
    const ox=p[0], oy=p[1], col=p[2]||'white';
    const nx=oy, ny=(8-ox);
    fc2.fillStyle=col;
    fc2.fillRect(nx*S+2, ny*S+2, S, S);
  }
}

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
function loop(){
  T++;
  cx.clearRect(0,0,W,H);

  cx.globalAlpha=0.03;
  for(let i=0;i<3;i++){
    const wy=(T*0.28+i*96)%H;
    cx.fillStyle='#3a8fa0'; cx.fillRect(0,Math.round(wy),W,2);
  }
  cx.globalAlpha=1;

  for(let i=FISH.length-1;i>=0;i--) if(!FISH[i].update()) FISH.splice(i,1);
  [...FISH].sort((a,b)=>a.y-b.y).forEach(renderFish);

  for(let i=RIPPLES.length-1;i>=0;i--){
    RIPPLES[i].step(); RIPPLES[i].draw();
    if(RIPPLES[i].done()) RIPPLES.splice(i,1);
  }
  if(T%110===0) RIPPLES.push(new Ripple(10+Math.random()*(W-20),10+Math.random()*(H-20),false));

  requestAnimationFrame(loop);
}

// ─── INPUT ───────────────────────────────────────────────────────────────────
function getXY(e){
  const r=oc.getBoundingClientRect(),sx=W/r.width,sy=H/r.height;
  if(e.touches) return{x:(e.touches[0].clientX-r.left)*sx,y:(e.touches[0].clientY-r.top)*sy};
  return{x:(e.clientX-r.left)*sx,y:(e.clientY-r.top)*sy};
}
function onClick(e){
  e.preventDefault();
  if(gameWon) return;
  const{x,y}=getXY(e);
  let hit=false;
  for(let i=FISH.length-1;i>=0;i--){
    if(!FISH[i].dead&&FISH[i].htest(x,y)){
      FISH[i].scare();
      RIPPLES.push(new Ripple(x,y,true));
      RIPPLES.push(new Ripple(FISH[i].x,FISH[i].y,false));
      hit=true; break;
    }
  }
  if(!hit) RIPPLES.push(new Ripple(x,y,false));
}
oc.addEventListener('click',onClick);
oc.addEventListener('touchend',onClick);
loop();
